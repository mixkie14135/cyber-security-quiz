<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Spy Quiz</title>

<style>
:root { --spy-green: #00ff41; --bg: #0d0d0d; }

body {
    background: var(--bg);
    color: var(--spy-green);
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

/* 🎬 Start Screen */
#start-screen {
    text-align: center;
    animation: fadeIn 1s ease;
}

#start-screen h1 {
    font-size: 1.8rem;
    margin-bottom: 20px;
}

#start-screen button {
    padding: 14px 20px;
    font-size: 1rem;
}

/* 🎮 Game */
#game-container {
    width: 100%;
    max-width: 500px;
    border: 2px solid var(--spy-green);
    padding: 16px;
    border-radius: 12px;
    background: rgba(0,0,0,0.9);
    box-shadow: 0 0 20px rgba(0,255,65,0.3);
    display: none;
    animation: fadeIn 0.5s ease;
}

.img-frame {
    width: 100%;
    height: 180px;
    background: #111;
    border-radius: 10px;
    margin-bottom: 15px;
    overflow: hidden;
    position: relative;
}

#q-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

.loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #666;
}

.question {
    color: #fff;
    margin-bottom: 15px;
}

.options {
    display: grid;
    gap: 10px;
}

button {
    background: transparent;
    border: 1px solid var(--spy-green);
    color: var(--spy-green);
    padding: 12px;
    cursor: pointer;
    border-radius: 6px;
}

button:hover {
    background: rgba(0,255,65,0.2);
}

.hidden { display: none; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- 🎬 หน้าเริ่ม -->
<div id="start-screen">
    <h1>Quiz</h1>
    <button onclick="startGame()">เริ่มภารกิจ</button>
</div>

<!-- 🎮 เกม -->
<div id="game-container">

    <div id="quiz-part">
        <div id="progress">ภารกิจที่: <span id="current-no">1</span>/10</div>

        <div class="img-frame">
            <div class="loader">กำลังโหลดภาพ...</div>
            <img id="q-image"
                onload="this.style.display='block'; document.querySelector('.loader').style.display='none';"
                onerror="this.style.display='none'; document.querySelector('.loader').innerText='โหลดภาพไม่สำเร็จ';">
        </div>

        <div class="question" id="q-text"></div>
        <div class="options" id="opt-box"></div>
    </div>

    <div id="result" class="hidden">
        <h2>สรุปภารกิจ</h2>
        <h1 id="final-score">0</h1>
        <p id="rank-text"></p>
        <button onclick="location.reload()">เริ่มใหม่</button>
    </div>

</div>

<!-- 🎧 เพลง -->
<audio id="bg-music" src="audio/bg.mp3" loop></audio>

<script>
const questions = [
    { q: "1. มีอีเมลบอกว่าคุณได้รางวัล ให้กรอกบัตรเครดิต?", img: "image/img1.jpg", a: ["รีบกรอก", "ส่งต่อ", "ลบทิ้ง"], correct: 2 },
    { q: "2. รหัสผ่านแบบไหนปลอดภัยสุด?", img: "image/img2.jpg", a: ["123456", "Pa$$w0rd_Strong_2024", "ชื่อเล่น"], correct: 1 },
    { q: "3. เจอ popup บอกเครื่องติดไวรัส?", img: "image/img3.jpg", a: ["กดทันที", "ปิด", "โหลดโปรแกรม"], correct: 1 },
    { q: "4. ใช้ WiFi สาธารณะเข้าแอปธนาคาร?", img: "image/img4.jpg", a: ["ใช้เลย", "ไม่ควร", "ใช้ถ้าเน็ตแรง"], correct: 1 },
    { q: "5. Malware เรียกค่าไถ่เรียกว่า?", img: "image/img5.jpg", a: ["Ransomware", "Spyware", "Adware"], correct: 0 },
    { q: "6. โพสต์ตั๋วเครื่องบินเห็นบาร์โค้ด?", img: "image/img6.jpg", a: ["เท่ดี", "อันตราย", "ไม่เป็นไร"], correct: 1 },
    { q: "7. 2FA สำคัญยังไง?", img: "image/img7.jpg", a: ["เน็ตช้า", "ปลอดภัยขึ้น", "แค่ยืนยันเบอร์"], correct: 1 },
    { q: "8. เพื่อนทักยืมเงินแปลกๆ?", img: "image/img8.jpg", a: ["โอนเลย", "โทรถาม", "บล็อก"], correct: 1 },
    { q: "9. Firewall ทำหน้าที่?", img: "image/img9.jpg", a: ["กันไฟ", "กรองข้อมูล", "ทำให้เย็น"], correct: 1 },
    { q: "10. วิธีดูแลความปลอดภัย?", img: "image/img10.jpg", a: ["ไม่อัปเดต", "อัปเดตสม่ำเสมอ", "แปะรหัสไว้"], correct: 1 }
];

let currentIdx = 0;
let score = 0;

function startGame(){
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("game-container").style.display = "block";

    startMusic();
    loadQ();
}

function startMusic(){
    const music = document.getElementById("bg-music");

    music.volume = 0.03; // 🔥 เริ่มเบามาก
    music.play();

    // 🎧 fade in เสียง
    let vol = 0.03;
    const fade = setInterval(()=>{
        if(vol < 0.12){
            vol += 0.01;
            music.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 200);
}

function loadQ() {
    document.querySelector('.loader').style.display = 'block';

    const img = document.getElementById("q-image");
    img.style.display = 'none';

    const data = questions[currentIdx];
    document.getElementById("current-no").innerText = currentIdx + 1;
    document.getElementById("q-text").innerText = data.q;

    img.src = data.img;

    const box = document.getElementById("opt-box");
    box.innerHTML = "";

    data.a.forEach((opt, i) => {
        const b = document.createElement("button");
        b.innerText = opt;

        b.onclick = () => {
            if(i === data.correct) score++;
            currentIdx++;

            if(currentIdx < questions.length) loadQ();
            else showFinal();
        };

        box.appendChild(b);
    });
}

function showFinal() {
    document.getElementById("quiz-part").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
    document.getElementById("final-score").innerText = `${score}/10`;

    const rText = score >= 8 ? "เยี่ยมมาก!" :
                  score >= 5 ? "สอบผ่านแบบหวุดหวิด" :
                  "ต้องฝึกเพิ่ม!";
    document.getElementById("rank-text").innerText = rText;
}
</script>

</body>
</html>
